<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>販売集計アプリ</title>

<!-- PWA / iOS -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1e2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="販売集計">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

<style>
:root {
  --bg: #f4f5f7;
  --bg2: #ffffff;
  --bg3: #eef0f4;
  --sidebar: #1a1e2e;
  --sidebar-hover: #252b40;
  --sidebar-active: #2e3650;
  --accent: #3b82f6;
  --accent-light: #eff6ff;
  --accent-dark: #1d4ed8;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --border: #e5e7eb;
  --border2: #d1d5db;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --green: #10b981;
  --blue-val: #1d4ed8;
  --shadow2: 0 4px 12px rgba(0,0,0,0.10);
  --radius: 8px;
  --radius2: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  height: -webkit-fill-available;
  font-size: 14px;
}

/* ── Layout ── */
#app { display: flex; width: 100%; height: 100%; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-top: var(--safe-top);
  transition: transform 0.25s ease;
  z-index: 100;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
#sidebar-header h1 { color: #fff; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
#sidebar-header p { color: rgba(255,255,255,0.4); font-size: 11px; }

.nav-section {
  padding: 12px 8px 4px;
  color: rgba(255,255,255,0.3);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin: 2px 8px;
  border-radius: 6px;
  cursor: pointer;
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  transition: background 0.15s;
  user-select: none;
  -webkit-user-select: none;
  min-height: 44px;
}
.nav-item:hover, .nav-item:active { background: var(--sidebar-hover); color: rgba(255,255,255,0.9); }
.nav-item.active { background: var(--accent); color: #fff; }
.nav-item .icon { width: 18px; height: 18px; flex-shrink: 0; }
#sidebar-footer {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  padding-bottom: calc(12px + var(--safe-bottom));
}

/* iPad: overlay sidebar on small screens */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 99;
}
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    height: 100%;
    transform: translateX(-100%);
    box-shadow: var(--shadow2);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay.open { display: block; }
  #main { width: 100%; }
}

/* ── Main ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  padding-top: var(--safe-top);
  height: calc(56px + var(--safe-top));
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#menu-btn {
  display: none;
  background: none;
  border: none;
  padding: 8px;
  cursor: pointer;
  color: var(--text);
  border-radius: var(--radius);
  flex-shrink: 0;
}
@media (max-width: 768px) { #menu-btn { display: flex; align-items: center; } }
#topbar h2 { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.month-selector { display: flex; align-items: center; gap: 5px; }
.month-selector label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.month-selector select {
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 6px 8px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  min-height: 36px;
}
.btn {
  padding: 8px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  min-height: 36px;
  transition: background 0.12s;
}
.btn:hover { background: var(--bg3); }
.btn-danger { color: var(--red); border-color: #fecaca; }
.btn-danger:hover { background: var(--red-bg); }

#content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  padding-bottom: calc(16px + var(--safe-bottom));
}

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Product pills ── */
.entry-controls { margin-bottom: 12px; }
.product-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  font-size: 12px;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.12s;
  white-space: nowrap;
  min-height: 36px;
  display: flex;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.pill.disabled { opacity: 0.35; pointer-events: none; }

/* ── Entry meta ── */
.entry-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
}
.entry-meta .meta-name { font-weight: 700; font-size: 15px; flex: 1; }
.entry-meta .meta-price { font-size: 13px; color: var(--text2); white-space: nowrap; }
.entry-meta .meta-price strong { color: var(--accent-dark); font-size: 15px; }

/* ── Summary cards ── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
@media (max-width: 600px) { .summary-row { grid-template-columns: repeat(2, 1fr); } }
.sum-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.sum-card .sl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.sum-card .sv { font-size: 18px; font-weight: 700; color: var(--text); }
.sum-card.blue .sv { color: var(--blue-val); }

/* ── Entry table ── */
.table-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  max-height: calc(100vh - 340px);
}
table.entry-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 360px; }
table.entry-table thead th {
  position: sticky; top: 0; z-index: 2;
  background: var(--bg3);
  padding: 9px 6px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.entry-table tbody tr:hover { background: var(--bg3); }
table.entry-table tbody td {
  padding: 3px 4px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  vertical-align: middle;
}
table.entry-table tbody tr:last-child td { border-bottom: none; }
.day-cell {
  font-size: 12px; color: var(--text2); font-weight: 600;
  width: 40px; min-width: 36px;
  background: var(--bg3);
  border-right: 1px solid var(--border);
  line-height: 1.3;
}
.today-row td { background: #fffbeb !important; }
.today-row .day-cell { color: #d97706; }
input.n {
  width: 72px;
  text-align: right;
  border: 1px solid var(--border2);
  border-radius: 5px;
  padding: 7px 6px;
  font-size: 14px;
  background: transparent;
  color: var(--text);
  transition: border-color 0.12s, box-shadow 0.12s;
  -webkit-appearance: none;
  appearance: none;
}
input.n:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
  background: var(--bg2);
}
.val-sales { font-weight: 600; color: var(--text); min-width: 50px; }
.val-amount { font-weight: 700; color: var(--blue-val); min-width: 78px; font-size: 12px; }
.val-neg { color: var(--red) !important; }
tfoot.entry-foot td {
  position: sticky; bottom: 0;
  background: var(--sidebar);
  color: #fff;
  padding: 9px 6px;
  font-size: 12px; font-weight: 600;
  border-top: 2px solid var(--border);
  text-align: center;
}
tfoot.entry-foot .foot-label { color: rgba(255,255,255,0.5); font-weight: 400; }
tfoot.entry-foot .foot-amount { color: #93c5fd; }

/* ── Summary page ── */
.summary-all-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
@media (max-width: 600px) { .summary-all-grid { grid-template-columns: repeat(2, 1fr); } }
.summary-total-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.summary-total-card.accent { border-left: 3px solid var(--accent); }
.summary-total-card .stl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.summary-total-card .stv { font-size: 20px; font-weight: 700; color: var(--text); }
.summary-total-card.accent .stv { color: var(--blue-val); }
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title .badge {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-light);
  color: var(--accent-dark);
}
.summary-table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
table.summary-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
table.summary-table thead th {
  background: var(--bg3);
  padding: 9px 12px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  border-bottom: 1px solid var(--border);
  text-align: right; white-space: nowrap;
}
table.summary-table thead th:first-child { text-align: left; }
table.summary-table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-align: right;
}
table.summary-table tbody td:first-child { text-align: left; font-weight: 600; }
table.summary-table tbody tr:last-child td { border-bottom: none; }
table.summary-table tbody tr:hover { background: var(--bg3); }
table.summary-table .td-amount { color: var(--blue-val); font-weight: 700; }
table.summary-table .td-ratio { color: var(--text2); font-size: 12px; }
table.summary-table tfoot td {
  background: var(--sidebar); color: #fff;
  padding: 9px 12px; font-weight: 700;
  border-top: 2px solid var(--border);
  text-align: right;
}
table.summary-table tfoot td:first-child { text-align: left; }
table.summary-table tfoot .f-amount { color: #93c5fd; }

/* ── Settings ── */
.info-bar {
  background: var(--accent-light);
  border: 1px solid #bfdbfe;
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px; color: var(--accent-dark);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}
.product-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.product-card-header { display: flex; align-items: center; gap: 8px; }
.product-num {
  width: 26px; height: 26px;
  background: var(--accent); color: #fff;
  border-radius: 50%; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.product-card label { font-size: 11px; color: var(--text2); margin-bottom: 3px; display: block; }
.product-card input[type="text"],
.product-card input[type="number"] {
  width: 100%;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 9px 10px;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  -webkit-appearance: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.product-card input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
.price-wrap { position: relative; }
.price-wrap span {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 12px; color: var(--text3);
  pointer-events: none;
}
.price-wrap input { padding-right: 24px; }

/* ── Offline banner ── */
#offline-banner {
  display: none;
  background: #fef3c7;
  border-bottom: 1px solid #fcd34d;
  padding: 6px 16px;
  font-size: 12px;
  color: #92400e;
  text-align: center;
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

<!-- Sidebar -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>📦 販売集計</h1>
    <p id="sb-month-label">読み込み中…</p>
  </div>
  <div class="nav-section">メニュー</div>
  <div class="nav-item active" onclick="showPage('entry')" id="nav-entry">
    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    データ入力
  </div>
  <div class="nav-item" onclick="showPage('summary')" id="nav-summary">
    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    集計・サマリー
  </div>
  <div class="nav-item" onclick="showPage('settings')" id="nav-settings">
    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    商品設定
  </div>
  <div class="nav-section" style="margin-top:8px;">商品一覧</div>
  <div id="product-nav-list"></div>
  <div id="sidebar-footer">オフライン対応 · 自動保存</div>
</nav>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div id="main">
  <div id="offline-banner">⚠️ オフラインです。データはローカルに保存されています。</div>
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()" aria-label="メニューを開く">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <h2 id="topbar-title">データ入力</h2>
    <div class="month-selector">
      <label>月：</label>
      <select id="sel-year" onchange="onMonthChange()"></select>
      <select id="sel-month" onchange="onMonthChange()">
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3">3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <button class="btn btn-danger" onclick="clearMonth()">リセット</button>
  </div>

  <div id="content">

    <!-- Entry -->
    <div class="page active" id="page-entry">
      <div class="entry-controls">
        <div class="product-pills" id="product-pills"></div>
      </div>
      <div class="entry-meta" id="entry-meta">
        <span class="meta-name" id="meta-name">—</span>
        <span class="meta-price">単価：<strong id="meta-price-val">¥0</strong></span>
      </div>
      <div class="summary-row">
        <div class="sum-card"><div class="sl">総納品数</div><div class="sv" id="es-del">0</div></div>
        <div class="sum-card"><div class="sl">総返品数</div><div class="sv" id="es-ret">0</div></div>
        <div class="sum-card blue"><div class="sl">総販売数</div><div class="sv" id="es-sales">0</div></div>
        <div class="sum-card blue"><div class="sl">総販売金額</div><div class="sv" id="es-amount">¥0</div></div>
      </div>
      <div class="table-container">
        <table class="entry-table">
          <thead>
            <tr>
              <th>日</th>
              <th>納品数</th>
              <th>返品数</th>
              <th>販売数</th>
              <th>販売金額</th>
            </tr>
          </thead>
          <tbody id="entry-tbody"></tbody>
          <tfoot class="entry-foot">
            <tr>
              <td class="foot-label">合計</td>
              <td id="ft-del">0</td>
              <td id="ft-ret">0</td>
              <td id="ft-sales">0</td>
              <td class="foot-amount" id="ft-amount">¥0</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- Summary -->
    <div class="page" id="page-summary">
      <div class="summary-all-grid" id="all-totals"></div>
      <div class="section-title">
        商品別集計
        <span class="badge" id="month-badge"></span>
      </div>
      <div class="summary-table-wrap">
        <table class="summary-table">
          <thead>
            <tr>
              <th>商品名</th>
              <th>単価</th>
              <th>総納品数</th>
              <th>総返品数</th>
              <th>総販売数</th>
              <th>販売金額</th>
              <th>構成比</th>
            </tr>
          </thead>
          <tbody id="summary-tbody"></tbody>
          <tfoot>
            <tr>
              <td>合計</td><td>—</td>
              <td id="sf-del">0</td>
              <td id="sf-ret">0</td>
              <td id="sf-sales">0</td>
              <td class="f-amount" id="sf-amount">¥0</td>
              <td>100%</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- Settings -->
    <div class="page" id="page-settings">
      <div class="info-bar">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        商品名と単価を設定してください。変更は自動保存されます。
      </div>
      <div class="products-grid" id="products-grid"></div>
    </div>

  </div>
</div>
</div>

<script>
const PRODUCT_COUNT = 10;
const STORAGE_KEY = 'sales-tracker-v1';
const today = new Date();

let state = {
  products: Array.from({length: PRODUCT_COUNT}, (_, i) => ({ name: `商品${i+1}`, price: 0 })),
  data: {}
};
let currentYear, currentMonth, currentProductIdx = 0, currentPage = 'entry';

/* Storage */
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try { state = JSON.parse(raw); } catch(e) { return; }
  if (!state.products) state.products = [];
  while (state.products.length < PRODUCT_COUNT)
    state.products.push({ name: `商品${state.products.length+1}`, price: 0 });
  if (!state.data) state.data = {};
}

function getDayData(y, m, p) {
  const k = `${y}-${m}-${p}`;
  if (!state.data[k]) state.data[k] = { del: new Array(31).fill(0), ret: new Array(31).fill(0) };
  return state.data[k];
}

/* Month selector */
function initMonthSelector() {
  const ysel = document.getElementById('sel-year');
  for (let y = today.getFullYear()-1; y <= today.getFullYear()+1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    if (y === today.getFullYear()) o.selected = true;
    ysel.appendChild(o);
  }
  document.getElementById('sel-month').value = today.getMonth()+1;
  currentYear = today.getFullYear();
  currentMonth = today.getMonth()+1;
  updateMonthLabel();
}
function onMonthChange() {
  currentYear = parseInt(document.getElementById('sel-year').value);
  currentMonth = parseInt(document.getElementById('sel-month').value);
  updateMonthLabel();
  renderEntryTable();
  renderSummaryPage();
}
function updateMonthLabel() {
  document.getElementById('sb-month-label').textContent = `${currentYear}年${currentMonth}月`;
  document.getElementById('month-badge').textContent = `${currentYear}年${currentMonth}月`;
}

/* Sidebar */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* Product nav */
function renderProductNav() {
  const list = document.getElementById('product-nav-list');
  list.innerHTML = '';
  state.products.forEach((p, i) => {
    if (!p.name.trim()) return;
    const el = document.createElement('div');
    el.className = 'nav-item' + (i === currentProductIdx && currentPage === 'entry' ? ' active' : '');
    el.onclick = () => { currentProductIdx = i; showPage('entry'); closeSidebar(); };
    el.innerHTML = `
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;">${p.name||`商品${i+1}`}</span>
    `;
    list.appendChild(el);
  });
}

/* Pills */
function renderProductPills() {
  const wrap = document.getElementById('product-pills');
  wrap.innerHTML = '';
  state.products.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'pill' + (i === currentProductIdx ? ' active' : '') + (!p.name.trim() ? ' disabled' : '');
    el.textContent = p.name || `商品${i+1}`;
    el.onclick = () => { currentProductIdx = i; switchProduct(); };
    wrap.appendChild(el);
  });
}

/* Days */
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

/* Entry table */
function renderEntryTable() {
  renderProductPills();
  const p = state.products[currentProductIdx];
  document.getElementById('meta-name').textContent = p.name || `商品${currentProductIdx+1}`;
  document.getElementById('meta-price-val').textContent = '¥' + (p.price||0).toLocaleString();
  const days = daysInMonth(currentYear, currentMonth);
  const dd = getDayData(currentYear, currentMonth, currentProductIdx);
  const tbody = document.getElementById('entry-tbody');
  tbody.innerHTML = '';
  for (let d = 0; d < days; d++) {
    const isToday = (today.getFullYear()===currentYear && today.getMonth()+1===currentMonth && today.getDate()===d+1);
    const tr = document.createElement('tr');
    if (isToday) tr.className = 'today-row';
    const del = dd.del[d]||0, ret = dd.ret[d]||0;
    const sales = del-ret, amount = Math.max(0,sales)*(p.price||0);
    tr.innerHTML = `
      <td class="day-cell">${d+1}${isToday?'<br><span style="font-size:9px;color:#d97706;">今日</span>':''}</td>
      <td><input class="n" type="number" inputmode="numeric" min="0" step="1" value="${del}" oninput="onCell(${d},'d',this.value)"></td>
      <td><input class="n" type="number" inputmode="numeric" min="0" step="1" value="${ret}" oninput="onCell(${d},'r',this.value)"></td>
      <td class="val-sales${sales<0?' val-neg':''}" id="vs-${d}">${sales}</td>
      <td class="val-amount${sales<0?' val-neg':''}" id="va-${d}">¥${amount.toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  }
  updateEntryTotals();
}

function switchProduct() {
  renderProductPills();
  const p = state.products[currentProductIdx];
  document.getElementById('meta-name').textContent = p.name||`商品${currentProductIdx+1}`;
  document.getElementById('meta-price-val').textContent = '¥'+(p.price||0).toLocaleString();
  const days = daysInMonth(currentYear,currentMonth);
  const dd = getDayData(currentYear,currentMonth,currentProductIdx);
  const inputs = document.querySelectorAll('#entry-tbody input.n');
  let di = 0;
  for (let d = 0; d < days; d++) {
    inputs[di].value = dd.del[d]||0;
    inputs[di+1].value = dd.ret[d]||0;
    di += 2;
  }
  updateAllRows();
  renderProductNav();
}

function onCell(day, type, val) {
  const v = Math.max(0, parseInt(val)||0);
  const dd = getDayData(currentYear,currentMonth,currentProductIdx);
  if (type==='d') dd.del[day]=v; else dd.ret[day]=v;
  save();
  updateRow(day);
  updateEntryTotals();
}

function updateRow(d) {
  const dd = getDayData(currentYear,currentMonth,currentProductIdx);
  const p = state.products[currentProductIdx];
  const del=dd.del[d]||0, ret=dd.ret[d]||0;
  const sales=del-ret, amount=Math.max(0,sales)*(p.price||0);
  const vs=document.getElementById('vs-'+d), va=document.getElementById('va-'+d);
  if(vs){vs.textContent=sales; vs.className='val-sales'+(sales<0?' val-neg':'');}
  if(va){va.textContent='¥'+amount.toLocaleString(); va.className='val-amount'+(sales<0?' val-neg':'');}
}

function updateAllRows() {
  const days=daysInMonth(currentYear,currentMonth);
  for(let d=0;d<days;d++) updateRow(d);
  updateEntryTotals();
}

function updateEntryTotals() {
  const dd=getDayData(currentYear,currentMonth,currentProductIdx);
  const p=state.products[currentProductIdx];
  const days=daysInMonth(currentYear,currentMonth);
  let td=0,tr=0,ts=0;
  for(let d=0;d<days;d++){
    td+=(dd.del[d]||0); tr+=(dd.ret[d]||0);
    ts+=Math.max(0,(dd.del[d]||0)-(dd.ret[d]||0));
  }
  const ta=ts*(p.price||0);
  document.getElementById('es-del').textContent=td.toLocaleString();
  document.getElementById('es-ret').textContent=tr.toLocaleString();
  document.getElementById('es-sales').textContent=ts.toLocaleString();
  document.getElementById('es-amount').textContent='¥'+ta.toLocaleString();
  document.getElementById('ft-del').textContent=td.toLocaleString();
  document.getElementById('ft-ret').textContent=tr.toLocaleString();
  document.getElementById('ft-sales').textContent=ts.toLocaleString();
  document.getElementById('ft-amount').textContent='¥'+ta.toLocaleString();
}

/* Summary */
function renderSummaryPage() {
  const days=daysInMonth(currentYear,currentMonth);
  let totalDel=0,totalRet=0,totalSales=0,totalAmount=0;
  const rows=[];
  state.products.forEach((p,i)=>{
    if(!p.name.trim()) return;
    const dd=getDayData(currentYear,currentMonth,i);
    let del=0,ret=0,sales=0;
    for(let d=0;d<days;d++){del+=(dd.del[d]||0);ret+=(dd.ret[d]||0);sales+=Math.max(0,(dd.del[d]||0)-(dd.ret[d]||0));}
    const amount=sales*(p.price||0);
    totalDel+=del;totalRet+=ret;totalSales+=sales;totalAmount+=amount;
    rows.push({name:p.name,price:p.price||0,del,ret,sales,amount});
  });
  document.getElementById('all-totals').innerHTML=`
    <div class="summary-total-card"><div class="stl">総納品数</div><div class="stv">${totalDel.toLocaleString()}</div></div>
    <div class="summary-total-card"><div class="stl">総返品数</div><div class="stv">${totalRet.toLocaleString()}</div></div>
    <div class="summary-total-card accent"><div class="stl">総販売数</div><div class="stv">${totalSales.toLocaleString()}</div></div>
    <div class="summary-total-card accent"><div class="stl">総販売金額</div><div class="stv">¥${totalAmount.toLocaleString()}</div></div>
  `;
  const tbody=document.getElementById('summary-tbody');
  tbody.innerHTML='';
  rows.forEach(r=>{
    const ratio=totalAmount>0?((r.amount/totalAmount)*100).toFixed(1):'0.0';
    const barW=totalAmount>0?Math.round((r.amount/totalAmount)*60):0;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${r.name}</td>
      <td>¥${r.price.toLocaleString()}</td>
      <td>${r.del.toLocaleString()}</td>
      <td>${r.ret.toLocaleString()}</td>
      <td>${r.sales.toLocaleString()}</td>
      <td class="td-amount">¥${r.amount.toLocaleString()}</td>
      <td class="td-ratio" style="text-align:right;">
        <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;">
          ${ratio}%
          <div style="width:50px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;">
            <div style="width:${barW}%;height:100%;background:var(--accent);border-radius:3px;"></div>
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('sf-del').textContent=totalDel.toLocaleString();
  document.getElementById('sf-ret').textContent=totalRet.toLocaleString();
  document.getElementById('sf-sales').textContent=totalSales.toLocaleString();
  document.getElementById('sf-amount').textContent='¥'+totalAmount.toLocaleString();
}

/* Settings */
function renderSettings() {
  const grid=document.getElementById('products-grid');
  grid.innerHTML='';
  state.products.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='product-card';
    card.innerHTML=`
      <div class="product-card-header">
        <div class="product-num">${i+1}</div>
        <span style="font-size:13px;font-weight:600;color:var(--text2);">商品 ${i+1}</span>
      </div>
      <div>
        <label>商品名</label>
        <input type="text" value="${p.name}" placeholder="例：おにぎり 鮭" maxlength="20" oninput="updateProduct(${i},'name',this.value)">
      </div>
      <div>
        <label>単価（円）</label>
        <div class="price-wrap">
          <input type="number" inputmode="numeric" value="${p.price}" min="0" step="1" placeholder="0" oninput="updateProduct(${i},'price',this.value)">
          <span>円</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function updateProduct(i,field,val) {
  if(field==='price') val=Math.max(0,parseInt(val)||0);
  state.products[i][field]=val;
  save();
  renderProductNav();
  renderProductPills();
  if(currentPage==='entry'){
    document.getElementById('meta-name').textContent=state.products[currentProductIdx].name||`商品${currentProductIdx+1}`;
    document.getElementById('meta-price-val').textContent='¥'+(state.products[currentProductIdx].price||0).toLocaleString();
    updateAllRows();
  }
}

/* Page switching */
function showPage(name) {
  currentPage=name;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  const titles={entry:'データ入力',summary:'集計・サマリー',settings:'商品設定'};
  document.getElementById('topbar-title').textContent=titles[name];
  if(name==='entry'){renderProductPills();renderProductNav();}
  if(name==='summary') renderSummaryPage();
  if(name==='settings') renderSettings();
  renderProductNav();
}

/* Clear */
function clearMonth() {
  if(!confirm(`${currentYear}年${currentMonth}月のデータをすべて削除しますか？`)) return;
  for(let i=0;i<PRODUCT_COUNT;i++) delete state.data[`${currentYear}-${currentMonth}-${i}`];
  save();
  if(currentPage==='entry') renderEntryTable();
  if(currentPage==='summary') renderSummaryPage();
}

/* Offline detection */
window.addEventListener('online', ()=>{ document.getElementById('offline-banner').style.display='none'; });
window.addEventListener('offline', ()=>{ document.getElementById('offline-banner').style.display='block'; });
if(!navigator.onLine) document.getElementById('offline-banner').style.display='block';

/* Service Worker */
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW:', err));
  });
}

/* Init */
load();
initMonthSelector();
renderSettings();
renderEntryTable();
renderProductNav();
</script>
</body>
</html>
